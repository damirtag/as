query GetFeed($pagination: PaginationInput!) {
  findPaginatedQuoteType(pagination: $pagination) {
    items {
      id
      text
      createdAt
      userId

      user {
        id
        createdAt
        updatedAt
        name
        username
      }

      commentsSummary {
        totalCount
      }

      reactionsSummary {
        totalCount
        counts {
          type
          count
        }
      }


    }
    total
    page
    totalPages
  }
}

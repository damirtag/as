version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: as_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: asdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: as_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  redis:
    image: redis:latest
    container_name: as_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: ./api
    container_name: as_api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"
    environment:
      PORT: 4000

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: 12345678
      DB_NAME: asdb

      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ""

      JWT_SECRET: damirtag
      JWT_ACCESS_TTL: 30m
      JWT_REFRESH_TTL: 30d

  web:
    build: ./web
    container_name: as_web
    restart: always
    depends_on:
      - api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: local
      VITE_PORT: 3000
      VITE_AUTH_URL: http://localhost:4000/auth
      VITE_GQL_URL: http://localhost:4000/graphql

volumes:
  postgres_data: